# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: cyb3rcore/reactify.sh
  branch: main

media_folder: src/client/public/images
public_folder: /images
site_url: https://reactify.sh

collections:
  - name: sections
    label: Landing Sections
    files:
      - name: hero
        label: Hero
        file: content/sections/hero.yaml
        fields:
          - { name: headline, label: Headline, widget: string }
          - { name: subheading, label: Subheading, widget: text }
          - { name: ctaText, label: CTA Text, widget: string }
          - { name: ctaLink, label: CTA Link, widget: string }

      - name: features
        label: Features
        file: content/sections/features.yaml
        fields:
          - name: features
            label: Features
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }

  - name: blog
    label: Blog
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime }
      - { name: excerpt, label: Excerpt, widget: text, required: false }
      - { name: body, label: Body, widget: markdown }

  - name: showcase
    label: Showcase
    folder: content/showcase
    create: true
    format: yaml
    fields:
      - { name: name, label: Name, widget: string }
      - { name: description, label: Description, widget: text }
      - { name: url, label: URL, widget: string, required: false }
      - { name: github, label: GitHub, widget: string, required: false }
